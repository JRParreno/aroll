name: aroll_mobile
description: Aroll+ mobile app — clean architecture with BLoC.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter_bloc: ^9.1.0
  get_it: ^8.0.3
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  flutter_dotenv: ^5.2.1
  image_picker: ^1.1.2
  shadcn_ui: ^0.54.0
  intl: ^0.20.2
  pdf: ^3.11.3
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  geolocator: ^13.0.4
  google_maps_flutter: ^2.12.1
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/logo.png
